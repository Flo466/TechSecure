services:
  flask_app:
    build: ./app
    container_name: techsecure_flask
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - FLASK_APP=${FLASK_APP}
      - FLASK_DEBUG=${FLASK_DEBUG}
    networks:
      - frontend_net
      - backend_net
    depends_on:
      - db_mysql

  db_mysql:
    image: mysql:8.0
    container_name: techsecure_db
    restart: always
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend_net

  adminer:
    image: adminer:latest
    container_name: techsecure_adminer
    restart: always
    ports:
      - "8082:8080"
    networks:
      - frontend_net
      - backend_net
    depends_on:
      - db_mysql

volumes:
  db_data:

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true