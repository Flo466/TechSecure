services:
  flask_app:
    build: ./app
    container_name: techsecure_flask
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db_mysql
      - DB_USER=techuser
      - DB_PASSWORD=SecretTechPassword2026
      - DB_NAME=techsecure_db
      - FLASK_SECRET_KEY=SuperSecretFlaskKey2026
      - FLASK_APP=app.py
      - FLASK_ENV=development
    networks:
      - techsecure_net
    depends_on:
      - db_mysql

  db_mysql:
    image: mysql:8.0
    container_name: techsecure_db
    restart: always
    environment:
      - MYSQL_DATABASE=techsecure_db
      - MYSQL_USER=techuser
      - MYSQL_PASSWORD=SecretTechPassword2026
      - MYSQL_ROOT_PASSWORD=RootSecretPassword2026
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - techsecure_net

  adminer:
    image: adminer:latest
    container_name: techsecure_adminer
    restart: always
    ports:
      - "8082:8080"
    networks:
      - techsecure_net
    depends_on:
      - db_mysql

volumes:
  db_data:

networks:
  techsecure_net:
    driver: bridge