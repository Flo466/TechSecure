{% extends 'base.html' %}

{% block content %}
<section class="section">
    <h2>AJOUTER UNE FILIALE</h2>

    <form action="{{ url_for('ajouter_filiale') }}" method="POST"
        style="max-width: 900px; margin: 40px auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">

        <!-- Colonne Gauche -->
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <div style="display: flex; flex-direction: column;">
                <label for="ville" style="font-weight: bold; margin-bottom: 5px;">Ville</label>
                <input type="text" id="ville" name="ville" placeholder="Ex : Lyon" required
                    style="padding: 10px; border: 1px solid var(--bordure); border-radius: 6px;">
            </div>
            <div style="display: flex; flex-direction: column;">
                <label for="adresse" style="font-weight: bold; margin-bottom: 5px;">Adresse</label>
                <input type="text" id="adresse" name="adresse" placeholder="Ex : 45 Rue de la République" required
                    style="padding: 10px; border: 1px solid var(--bordure); border-radius: 6px;">
            </div>
            <div style="display: flex; flex-direction: column;">
                <label for="responsable" style="font-weight: bold; margin-bottom: 5px;">Responsable</label>
                <input type="text" id="responsable" name="responsable" placeholder="Ex : Sophie Martin" required
                    style="padding: 10px; border: 1px solid var(--bordure); border-radius: 6px;">
            </div>
        </div>

        <!-- Colonne Droite -->
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <div style="display: flex; flex-direction: column;">
                <label for="employes" style="font-weight: bold; margin-bottom: 5px;">Nombre d'employés</label>
                <input type="number" id="employes" name="employes" placeholder="Ex : 42" required
                    style="padding: 10px; border: 1px solid var(--bordure); border-radius: 6px;">
            </div>
            <div style="display: flex; flex-direction: column;">
                <label for="ip_reseau" style="font-weight: bold; margin-bottom: 5px;">Adresse IP du routeur</label>
                <input type="text" id="ip_reseau" name="ip_reseau" placeholder="Ex : 192.168.2.1" required
                    style="padding: 10px; border: 1px solid var(--bordure); border-radius: 6px;">
            </div>

            <!-- Espace vide pour aligner le bouton en bas -->
            <div style="margin-top: auto;">
                <button type="submit" class="btn" style="width: 100%;">ENREGISTRER LA FILIALE</button>
            </div>
        </div>

    </form>
</section>
{% endblock %}
