{% extends 'base.html' %}

{% block content %}
<section class="section">
    <h2>{% if f %}MODIFIER LA FILIALE{% else %}AJOUTER UNE FILIALE{% endif %}</h2>

    <form
        action="{% if f %}{{ url_for('editer_filiale', id=f.id) }}{% else %}{{ url_for('ajouter_filiale') }}{% endif %}"
        method="POST"
        style="max-width: 900px; margin: 40px auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">

        <div style="display: flex; flex-direction: column; gap: 15px;">
            <div style="display: flex; flex-direction: column;">
                <label for="ville" style="font-weight: bold; margin-bottom: 5px;">Ville</label>
                <input type="text" id="ville" name="ville" value="{{ f.ville if f else '' }}" placeholder="Ex : Lyon"
                    required style="padding: 10px; border: 1px solid var(--bordure); border-radius: 6px;">
            </div>
            <div style="display: flex; flex-direction: column;">
                <label for="adresse" style="font-weight: bold; margin-bottom: 5px;">Adresse</label>
                <input type="text" id="adresse" name="adresse" value="{{ f.adresse if f else '' }}"
                    placeholder="Ex : 45 Rue de la République" required
                    style="padding: 10px; border: 1px solid var(--bordure); border-radius: 6px;">
            </div>
            <div style="display: flex; flex-direction: column;">
                <label for="responsable" style="font-weight: bold; margin-bottom: 5px;">Responsable</label>
                <input type="text" id="responsable" name="responsable" value="{{ f.responsable if f else '' }}"
                    placeholder="Ex : Sophie Martin" required
                    style="padding: 10px; border: 1px solid var(--bordure); border-radius: 6px;">
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 15px;">
            <div style="display: flex; flex-direction: column;">
                <label for="employes" style="font-weight: bold; margin-bottom: 5px;">Nombre d'employés</label>
                <input type="number" id="employes" name="employes" value="{{ f.employes if f else '' }}"
                    placeholder="Ex : 42" required
                    style="padding: 10px; border: 1px solid var(--bordure); border-radius: 6px;">
            </div>
            <div style="display: flex; flex-direction: column;">
                <label for="ip_reseau" style="font-weight: bold; margin-bottom: 5px;">Adresse IP du routeur</label>
                <input type="text" id="ip_reseau" name="ip_reseau" value="{{ f.ip_reseau if f else '' }}"
                    placeholder="Ex : 192.168.2.1" required
                    style="padding: 10px; border: 1px solid var(--bordure); border-radius: 6px;">
            </div>

            <div style="margin-top: auto;">
                <button type="submit" class="btn" style="width: 100%;">
                    {% if f %}ENREGISTRER LES MODIFICATIONS{% else %}ENREGISTRER LA FILIALE{% endif %}
                </button>
            </div>
        </div>
    </form>
</section>
{% endblock %}
